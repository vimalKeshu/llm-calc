model:
  vocab_size: 22
  max_seq_len: 20
  d_model: 256
  attention_heads: 8
  n_layers: 2
  n_loops: 8
  dropout: 0.05
  use_abacus: true
  input_injection: true
  loop_signal: true
  abacus_base: 4
  max_abacus_offset: 16
  min_abacus_decimal_exponent: -3
  max_abacus_integer_exponent: 5
  abacus_zero_offset_probability: 0.5

grpo:
  checkpoint_path: ckp/grpo_loop_iter2_v2_256x2x8.pt
  data_sources:
    - data_path: sample/pretrain_v2.jsonl
      split: val
    - data_path: sample/grpo_train_v2_seed20260717.jsonl
      split: test
    - data_path: sample/grpo_selection_v2_seed20260718.jsonl
      split: test
    - data_path: sample/grpo_selection_v2_seed20260719.jsonl
      split: test
  output_path: ckp/grpo_loop_iter3_v2_256x2x8.pt
  epochs: 2
  prompts_per_epoch: 1200
  prompt_batch_size: 4
  operation_weights:
    "*": 0.47
    "/": 0.38
    "+": 0.075
    "-": 0.075
  group_sizes:
    "*": 8
    "/": 16
    "+": 8
    "-": 8
  optimization_epochs: 1
  temperature: 1.0
  lr: 1.0e-6
  weight_decay: 0.0
  clip_epsilon: 0.2
  beta: 0.01
  max_grad_norm: 1.0
  log_every: 20
  seed: 45

replay:
  data_path: sample/pretrain_v2.jsonl
  split: train
  operations: ["+", "-"]
  pool_per_operation: 10000
  batch_size: 16
  supervised_weight: 0.20
  distillation_weight: 1.00

eval:
  data_path: sample/grpo_selection_v2_seed20260720.jsonl
  split: test
  batch_size: 128
  limit: 0
  every_epochs: 1
  checkpoint_gate:
    protected_operations:
      "+": 0.002
      "-": 0.002
    overall_regression_tolerance: 0.001
    target_weights:
      "*": 0.55
      "/": 0.45
