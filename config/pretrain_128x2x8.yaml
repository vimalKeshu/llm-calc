model:
  vocab_size: 21
  max_seq_len: 18
  d_model: 128
  attention_heads: 4
  n_layers: 2
  n_loops: 8            # 0.40M params, effective depth 16
  dropout: 0.05

train:
  data_path: sample/pretrain_balanced.jsonl
  batch_size: 128
  epochs: 80
  lr: 3e-4
  weight_decay: 0.01
  save_every: 5
  exact_eval_every: 5
  target_accuracy: 0.95
  checkpoint_path: ckp/final_128x2x8.pt

eval:
  data_path: config/pretrain_eval.yaml
  temp: 0
  reverse: false
  checkpoint_path: ckp/final_128x2x8.pt
