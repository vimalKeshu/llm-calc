meta:
  name: three_digit_algorithmic_understanding
  version: 7
  description: >-
    Greedy exact-match tests of arithmetic mechanisms inside the supported
    calculator domain. Every operand has absolute value at most 999; answers
    may be longer (a three-by-three-digit product can have six digits) or NAN
    for a zero divisor.
    Prompts are required to be absent from the configured training split.
  max_abs_operand: 999
  require_unseen_from_training: true

groups:
  # Addition is separated by carry structure. This tests whether the model
  # applies the column rule, rather than merely recognizing operand size.
  - name: addition_no_carry
    scope: structural
    principle: Three-digit addition where no column produces a carry.
    data:
      - "6+520="
      - "516+72="
      - "621+61="
      - "354+25="
      - "881+3="
      - "144+844="
      - "622+34="
      - "437+22="
      - "533+213="
      - "261+516="

